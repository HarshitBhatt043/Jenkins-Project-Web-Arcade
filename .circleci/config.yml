version: 2.1

workflows:
  main:
    jobs:
      - build:
          context: SonarCloud

orbs:
  sonarcloud: sonarsource/sonarcloud@2.0.0

jobs:
  build:
    docker:
      - image: node:latest
    steps:
      - run:
          name: Clonning Code
          command: git clone --single-branch --depth 1 $CIRCLE_REPOSITORY_URL -b $CIRCLE_BRANCH
      - sonarcloud/scan
