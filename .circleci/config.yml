version: 2.1

workflows:
  main:
    jobs:
      - build:
          context: SonarCloud

orbs:
  sonarcloud: sonarsource/sonarcloud@2.0.0

jobs:
  build:
    docker:
      - image: node:latest
    parameters:
      repo-name:
        type: string
        default: "Jenkins-Project-Web-Arcade"
      project_root:
        default: "$CIRCLE_WORKING_DIRECTORY/$repo-name"
        type: string
    steps:
      - run:
          name: Clonning Code
          command: git clone --no-checkout --single-branch --depth 1 -b "$CIRCLE_BRANCH" << pipeline.trigger_parameters.github_app.repo_url >> .
      - sonarcloud/scan
