version: 2.1

jobs:
  Tests And Analysis:
    docker:
      - image: node:18
    steps:
      - run:
          name: Getting Code For Tests And Analysis
          command: git clone --single-branch --depth 1 -b "$CIRCLE_BRANCH" << pipeline.trigger_parameters.github_app.repo_url >> $CIRCLE_WORKING_DIRECTORY
      - sonarcloud/scan:
          project_root: $CIRCLE_WORKING_DIRECTORY
      - run:
          name: Quality Gate Check
          command: |
            projectKey=$(grep '^sonar.projectKey=' "$CIRCLE_WORKING_DIRECTORY/sonar-project.properties" | cut -d'=' -f2 | tr -d '[:space:]')
            value=$(curl -s "${SONARURL}api/measures/component?component=${projectKey}&branch=circleci-project-setup&metricKeys=alert_status" | grep -o '"value":"[^"]*"' | cut -d':' -f2 | tr -d '"')

            if [ "$value" == "OK" ]; then
                echo "Quality gate passed"
                exit 0
            else
                echo "Quality gate failed"
                exit 1
            fi

  Notification:
    docker:
      - image: cimg/base:current
    steps:
      - run:
          name: Setting Up Notification Enviroment
          command: git clone --single-branch --depth 1 -b "$CIRCLE_BRANCH" << pipeline.trigger_parameters.github_app.repo_url >> $CIRCLE_WORKING_DIRECTORY
      - run:
          name: Sending Notification
          command: cd $CIRCLE_WORKING_DIRECTORY && bash ./scripts/notify.sh

  Building:
    docker:
      - image: cimg/base:current
    steps:
      - run:
          name: Setting Up Asset Enviroment
          command: git clone --single-branch --depth 1 -b "$CIRCLE_BRANCH" << pipeline.trigger_parameters.github_app.repo_url >> $CIRCLE_WORKING_DIRECTORY
      - run:
          name: Checking path and downloading asset
          command: bash $CIRCLE_WORKING_DIRECTORY/scripts/asset.sh
      - setup_remote_docker
      - run:
          name: Build and Push Arcade Docker image
          command: |
            TAG=latest
            docker build -t $DOCKERHUB_USERNAME/arcade:$TAG .
            echo $DOCKERHUB_PASSWORD | docker login -u $DOCKERHUB_USERNAME --password-stdin
            docker push $DOCKERHUB_USERNAME/arcade:$TAG

  Deploy:
    docker:
      - image: cimg/base:current
    steps:
      - add_ssh_keys:
          fingerprints:
            - "14:38:11:21:1b:8d:fb:30:34:5c:2f:f8:a0:ac:e8:49"
      - run:
          name: Add SSH host to known
          command: ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts
      - run:
          name: test
          command: |
            ssh $SSH_USER@$SSH_HOST "directory_path="$Arcadepath"

            if [ -d "$directory_path" ]; then
                filesCount=$(ls -1 "$directory_path" | wc -l | tr -d '[:space:]')

                if [ "$filesCount" -gt 0 ]; then
                    echo "Asset already available."
                else
                    mkdir -p "$directory_path"
                    wget -q "$Arcade" -P "$directory_path"
                    mv "$directory_path"/* "$Arcadename"

                    downloadedFilesCount=$(ls -1 "$Arcadename" | wc -l | tr -d '[:space:]')

                    if [ "$downloadedFilesCount" -gt 0 ]; then
                        echo "Asset download successful."
                    else
                        echo "Pipeline aborted due to failure: Link changed or Expired"
                        exit 1
                    fi
                fi
            else
                mkdir -p "$directory_path"
                wget -q "$Arcade" -P "$directory_path"
                mv "$directory_path"/* "$Arcadename"

                downloadedFilesCount=$(ls -1 "$Arcadename" | wc -l | tr -d '[:space:]')

                if [ "$downloadedFilesCount" -gt 0 ]; then
                    echo "Asset download successful."
                else
                    echo "Pipeline aborted due to failure: Link changed or Expired"
                    exit 1
                fi
            fi"

orbs:
  sonarcloud: sonarsource/sonarcloud@2.0.0

