version: 2.1

jobs:
  Tests And Analysis:
    docker:
      - image: node:18
    steps:
      - run:
          name: Clonning Code
          command: git clone --single-branch --depth 1 -b "$CIRCLE_BRANCH" << pipeline.trigger_parameters.github_app.repo_url >> $CIRCLE_WORKING_DIRECTORY
      - sonarcloud/scan:
          project_root: $CIRCLE_WORKING_DIRECTORY
      - run:
          name: QC Check
          command: bash $CIRCLE_WORKING_DIRECTORY/scripts/qc.sh

  Notification:
    docker:
      - image: cimg/base:current
    steps:
      - run:
          name: Testing
          command: pwd && ls -l && echo $CHAT_ID

orbs:
  sonarcloud: sonarsource/sonarcloud@2.0.0

workflows:
  Arcade-Prod-Pipeline:
    jobs:
      - Tests And Analysis:
          context: SonarCloud
      - hold:
          type: approval
          requires:
            - Tests And Analysis

      - Notification:
          context: Telegram
          requires:
            - hold
