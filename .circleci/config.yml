version: 2.1

jobs:
  Tests And Analysis:
    docker:
      - image: node:18
    steps:
      - run:
          name: Getting Code For Tests And Analysis
          command: git clone --single-branch --depth 1 -b "$CIRCLE_BRANCH" << pipeline.trigger_parameters.github_app.repo_url >> $CIRCLE_WORKING_DIRECTORY
      - sonarcloud/scan:
          project_root: $CIRCLE_WORKING_DIRECTORY
      - run:
          name: Quality Gate Check
          command: bash $CIRCLE_WORKING_DIRECTORY/scripts/qc.sh

  Notification:
    docker:
      - image: cimg/base:current
    steps:
      - run:
          name: Setting Up Notification Enviroment
          command: git clone --single-branch --depth 1 -b "$CIRCLE_BRANCH" << pipeline.trigger_parameters.github_app.repo_url >> $CIRCLE_WORKING_DIRECTORY
      - run:
          name: Sending Notification
          command: cd $CIRCLE_WORKING_DIRECTORY && bash ./scripts/notify.sh

  Building:
    docker:
      - image: cimg/base:current
    steps:
      - run:
          name: Setting Up Asset Enviroment
          command: git clone --single-branch --depth 1 -b "$CIRCLE_BRANCH" << pipeline.trigger_parameters.github_app.repo_url >> $CIRCLE_WORKING_DIRECTORY
      - run:
          name: Checking path and downloading asset
          command: mkdir -p "$Arcadepath" && wget -q "$Arcade" -P "$Arcadepath" && mv "$Arcadepath"/* "$Arcadename" && ls -1 "$Arcadename" | wc -l | tr -d '[:space:]' && cd "/home/circleci/project/~/project/cloud/assets/Drift-Hunters/Build/" && ls && ls -l

orbs:
  sonarcloud: sonarsource/sonarcloud@2.0.0

workflows:
  Arcade:
    jobs:
  #    - Tests And Analysis:
  #        context: SonarCloud

  #    - Notification:
  #        context:
  #          - SonarCloud
  #          - Telegram
  #        requires:
  #          - Tests And Analysis

      - Building:
          context:
            - Docker
